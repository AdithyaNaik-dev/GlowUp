name: glowup
description: "GlowUp - 30 Day Glow Up Challenge"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  google_fonts: ^6.3.2
  share_plus: ^12.0.1
  url_launcher: ^6.3.2
  lottie: ^3.3.1
  dotlottie_loader: ^0.0.4
  camera: ^0.11.0+2
  flutter_tts: 4.0.0
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  google_sign_in: ^6.2.2
  google_mobile_ads: ^5.3.0
  cloud_firestore: ^5.6.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.jpeg"
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/images/logo.jpeg"

flutter:
  uses-material-design: true

  assets:
    - assets/data/exercise_plan.json
    - assets/images/logo.jpeg
    - assets/images/glowup-humans.png
    - assets/images/excersise/face/
    - assets/images/excersise/body/
    - assets/animation/onboarding1.lottie
    - assets/animation/onboarding2.lottie
    - assets/animation/onboarding3.lottie
    - assets/animation/start.lottie
    - assets/animation/rest.lottie
    - "assets/animation/Empty Notifications.lottie"
    - "assets/animation/Confetti - Full Screen.lottie"
    - assets/animation/Completed.lottie
